<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — GesVentas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">🏪 GesVentas</a>
  <ul class="nav-links">
    <li><a href="register.html">Crear Cuenta</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Iniciar Sesión</h1>
    <p class="auth-subtitle">Accede a tu cuenta para gestionar tus pedidos</p>

    <div id="alert-container"></div>

    <form id="login-form" novalidate autocomplete="off">
      <input type="text" name="fake_user" autocomplete="username" style="display:none" />
      <input type="password" name="fake_pass" autocomplete="current-password" style="display:none" />
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico *</label>
        <input type="email" id="email" class="form-control"
               placeholder="correo@ejemplo.com"
               name="login_email_field"
               autocomplete="new-password"
               readonly
               onfocus="this.removeAttribute('readonly');"
               autofocus />
        <div class="form-error" id="err-email"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña *</label>
        <input type="password" id="password" class="form-control"
           placeholder="Tu contraseña"
           name="login_password_field"
           autocomplete="new-password"
           readonly
           onfocus="this.removeAttribute('readonly');" />
        <div class="form-error" id="err-password"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        Iniciar Sesión
      </button>
    </form>

    <p style="text-align:center;margin-top:1rem;font-size:.9rem">
      <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>
    </p>
    <p style="text-align:center;margin-top:.5rem;font-size:.9rem;color:var(--text-light)">
      ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
function normalizeEmail(value) {
  return (value || "")
    .normalize("NFKC")
    .replace(/[\u200B-\u200D\uFEFF]/g, "")
    .replace(/\s+/g, "")
    .toLowerCase();
}

function resetLoginFields() {
  const emailInput = document.getElementById("email");
  const passInput = document.getElementById("password");
  emailInput.value = "";
  passInput.value = "";
  emailInput.setAttribute("readonly", "readonly");
  passInput.setAttribute("readonly", "readonly");

  // Algunos navegadores rellenan despues de DOMContentLoaded.
  setTimeout(() => { emailInput.value = ""; passInput.value = ""; }, 100);
  setTimeout(() => { emailInput.value = ""; passInput.value = ""; }, 400);
}

redirectIfAuth("index.html");

window.addEventListener("DOMContentLoaded", resetLoginFields);
window.addEventListener("pageshow", resetLoginFields);

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErrors();

  const email = normalizeEmail(document.getElementById("email").value);
  const password = document.getElementById("password").value;

  document.getElementById("email").value = email;

  let hasError = false;
  if (!isValidEmail(email)) {
    setError("err-email", "Introduce un correo valido.");
    hasError = true;
  }
  if (!password) {
    setError("err-password", "La contraseña es obligatoria.");
    hasError = true;
  }
  if (hasError) return;

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Autenticando...";

  try {
    await window.api.login(email, password);
    showToast("¡Bienvenido de vuelta! 👋", "success");
    const next = new URLSearchParams(window.location.search).get("next") || "index.html";
    setTimeout(() => window.location.href = next, 800);
  } catch (err) {
    const msg = parseLoginError(err.message, err.status);
    document.getElementById("alert-container").innerHTML =
      `<div class="alert alert-danger">❌ ${escapeHtml(msg)}</div>`;
    document.getElementById("password").value = "";
    document.getElementById("email").focus();
  } finally {
    btn.disabled = false;
    btn.textContent = "Iniciar Sesión";
  }
});

function setError(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
}

function clearErrors() {
  document.querySelectorAll(".form-error").forEach(el => el.textContent = "");
  document.getElementById("alert-container").innerHTML = "";
}

function parseLoginError(msg, status) {
  if (status === 401) return "Correo o contraseña incorrectos.";
  if (status === 403) return "Tu cuenta esta desactivada. Contacta al administrador.";
  return msg || "Error al iniciar sesion.";
}
</script>
</body>
</html>
