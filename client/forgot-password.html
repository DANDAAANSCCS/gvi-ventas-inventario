<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Contraseña — GesVentas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">🏪 GesVentas</a>
  <ul class="nav-links">
    <li><a href="login.html">Iniciar Sesión</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Recuperar contraseña</h1>
    <p class="auth-subtitle">Te enviaremos un enlace por correo para crear una contraseña nueva.</p>

    <div id="alert-container"></div>

    <form id="forgot-form" novalidate autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico *</label>
        <input type="email" id="email" class="form-control"
               placeholder="correo@ejemplo.com"
               autocomplete="new-password"
               readonly
               onfocus="this.removeAttribute('readonly');"
               autofocus />
        <div class="form-error" id="err-email"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        Enviar enlace
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.9rem">
      <a href="login.html">← Volver al login</a>
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
function normalizeEmail(value) {
  return (value || "")
    .normalize("NFKC")
    .replace(/[\u200B-\u200D\uFEFF]/g, "")
    .replace(/\s+/g, "")
    .toLowerCase();
}

redirectIfAuth("index.html");

document.getElementById("forgot-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const alertBox = document.getElementById("alert-container");
  const errEmail = document.getElementById("err-email");
  errEmail.textContent = "";
  alertBox.innerHTML = "";

  const email = normalizeEmail(document.getElementById("email").value);
  document.getElementById("email").value = email;

  if (!isValidEmail(email)) {
    errEmail.textContent = "Introduce un correo valido.";
    return;
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Enviando...";

  try {
    const res = await window.api.forgotPassword(email);
    alertBox.innerHTML = `
      <div class="alert alert-success">
        ✅ ${escapeHtml(res.message || "Si el correo esta registrado, recibiras un enlace en unos minutos.")}
        <br/><small>Revisa tu bandeja de entrada y tambien la carpeta de spam.</small>
      </div>`;
    document.getElementById("email").value = "";
  } catch (err) {
    alertBox.innerHTML =
      `<div class="alert alert-danger">❌ ${escapeHtml(err.message || "No se pudo procesar la solicitud.")}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Enviar enlace";
  }
});
</script>
</body>
</html>
