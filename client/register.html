<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — GesVentas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">🏪 GesVentas</a>
  <ul class="nav-links">
    <li><a href="login.html">Ya tengo cuenta</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Crear Cuenta</h1>
    <p class="auth-subtitle">Regístrate para comprar en GesVentas</p>

    <div id="alert-container"></div>

    <form id="register-form" novalidate autocomplete="off">
      <input type="text" name="fake_user" autocomplete="username" style="display:none" />
      <input type="password" name="fake_pass" autocomplete="current-password" style="display:none" />

      <div class="form-group">
        <label class="form-label" for="name">Nombre completo *</label>
        <input type="text" id="name" class="form-control"
               placeholder="Juan Pérez" autocomplete="off"
               readonly onfocus="this.removeAttribute('readonly');" />
        <div class="form-error" id="err-name"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico *</label>
        <input type="email" id="email" class="form-control"
               placeholder="correo@ejemplo.com" autocomplete="new-password"
               readonly onfocus="this.removeAttribute('readonly');" />
        <div class="form-error" id="err-email"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Teléfono</label>
        <input type="tel" id="phone" class="form-control"
               placeholder="+52 55 1234 5678" autocomplete="off"
               readonly onfocus="this.removeAttribute('readonly');" />
        <div class="form-error" id="err-phone"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="address">Dirección de envío</label>
        <textarea id="address" class="form-control" rows="2"
                  placeholder="Calle, número, colonia, ciudad"
                  autocomplete="off"
                  readonly onfocus="this.removeAttribute('readonly');"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña *</label>
        <input type="password" id="password" class="form-control"
               placeholder="Mínimo 8 caracteres" autocomplete="new-password"
               readonly onfocus="this.removeAttribute('readonly');" />
        <div class="form-hint">Usa letras, números y caracteres especiales</div>
        <div class="form-error" id="err-password"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirmar Contraseña *</label>
        <input type="password" id="confirm-password" class="form-control"
               placeholder="Repite tu contraseña" autocomplete="new-password"
               readonly onfocus="this.removeAttribute('readonly');" />
        <div class="form-error" id="err-confirm"></div>
      </div>

      <div class="form-group" style="display:flex;gap:8px;align-items:flex-start">
        <input type="checkbox" id="terms" style="margin-top:3px;flex-shrink:0" />
        <label for="terms" style="font-size:.9rem;color:var(--text-light)">
          Acepto los <a href="terms.html" target="_blank" rel="noopener">términos y condiciones</a>
          y la política de privacidad
        </label>
      </div>
      <div class="form-error" id="err-terms"></div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        Crear Cuenta
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.9rem;color:var(--text-light)">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
function extractMxLocalDigits(value) {
  const raw = (value || "").trim();
  let digits = raw.replace(/\D/g, "");
  if (raw.startsWith("+52")) digits = digits.slice(2);
  if (digits.length === 12 && digits.startsWith("52")) digits = digits.slice(2);
  return digits.slice(0, 10);
}

function formatMxPhoneForDisplay(value) {
  const local = extractMxLocalDigits(value);
  if (!local) return "+52 ";
  if (local.length <= 2) return `+52 ${local}`;
  if (local.length <= 6) return `+52 ${local.slice(0, 2)} ${local.slice(2)}`;
  return `+52 ${local.slice(0, 2)} ${local.slice(2, 6)} ${local.slice(6)}`;
}

function normalizeEmail(value) {
  return (value || "")
    .normalize("NFKC")
    .replace(/[\u200B-\u200D\uFEFF]/g, "")
    .replace(/\s+/g, "")
    .toLowerCase();
}

function setupPhonePrefix() {
  const phoneInput = document.getElementById("phone");
  if (!phoneInput) return;

  phoneInput.addEventListener("focus", () => {
    const val = phoneInput.value.trim();
    if (!val) phoneInput.value = "+52 ";
    phoneInput.setSelectionRange(phoneInput.value.length, phoneInput.value.length);
  });

  phoneInput.addEventListener("input", () => {
    if (phoneInput.value === "") return;
    const localDigits = extractMxLocalDigits(phoneInput.value);
    phoneInput.value = localDigits ? formatMxPhoneForDisplay(localDigits) : "+52 ";
    phoneInput.setSelectionRange(phoneInput.value.length, phoneInput.value.length);
  });

  phoneInput.addEventListener("blur", () => {
    const localDigits = extractMxLocalDigits(phoneInput.value);
    phoneInput.value = localDigits ? formatMxPhoneForDisplay(localDigits) : "";
  });
}

function resetRegisterFields() {
  const form = document.getElementById("register-form");
  form.reset();

  const fields = ["name", "email", "phone", "address", "password", "confirm-password"];
  fields.forEach((id) => {
    const input = document.getElementById(id);
    if (!input) return;
    input.value = "";
    input.setAttribute("readonly", "readonly");
  });

  const terms = document.getElementById("terms");
  if (terms) terms.checked = false;

  setTimeout(() => {
    fields.forEach((id) => {
      const input = document.getElementById(id);
      if (input) input.value = "";
    });
  }, 100);
  setTimeout(() => {
    fields.forEach((id) => {
      const input = document.getElementById(id);
      if (input) input.value = "";
    });
  }, 400);
}

redirectIfAuth("index.html");

window.addEventListener("DOMContentLoaded", resetRegisterFields);
window.addEventListener("pageshow", resetRegisterFields);
window.addEventListener("DOMContentLoaded", setupPhonePrefix);

document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErrors();

  const name = document.getElementById("name").value.trim();
  const email = normalizeEmail(document.getElementById("email").value);
  const phoneInputValue = document.getElementById("phone").value.trim();
  const phoneDigits = extractMxLocalDigits(phoneInputValue);
  const phone = phoneDigits ? formatMxPhoneForDisplay(phoneDigits) : "";
  const address = document.getElementById("address").value.trim();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm-password").value;
  const terms = document.getElementById("terms").checked;

  document.getElementById("email").value = email;

  let hasError = false;
  if (!name || name.length < 2) {
    setError("err-name", "El nombre debe tener al menos 2 caracteres.");
    hasError = true;
  }
  if (!isValidEmail(email)) {
    setError("err-email", "Correo electronico invalido.");
    hasError = true;
  }
  if (phone && phoneDigits.length !== 10) {
    setError("err-phone", "Telefono invalido. Debe tener 10 digitos.");
    hasError = true;
  }
  if (!password || password.length < 8) {
    setError("err-password", "La contraseña debe tener al menos 8 caracteres.");
    hasError = true;
  }
  if (password !== confirm) {
    setError("err-confirm", "Las contraseñas no coinciden.");
    hasError = true;
  }
  if (!terms) {
    setError("err-terms", "Debes aceptar los terminos y condiciones.");
    hasError = true;
  }
  if (hasError) return;

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Registrando...";

  try {
    // /auth/register ya devuelve token; queda logueado automaticamente.
    await window.api.register({
      email,
      password,
      name,
      phone: phone || null,
      address: address || null,
    });
    document.getElementById("alert-container").innerHTML = `
      <div class="alert alert-success">
        ✅ Cuenta creada. Redirigiendo al catalogo...
      </div>`;
    setTimeout(() => window.location.href = "index.html", 1000);
  } catch (err) {
    const msg = parseAuthError(err.message, err.status);
    document.getElementById("alert-container").innerHTML =
      `<div class="alert alert-danger">❌ ${escapeHtml(msg)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Crear Cuenta";
  }
});

function setError(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
  const inputId = id.replace("err-", "");
  const input = document.getElementById(inputId);
  if (input) input.classList.add("error");
}

function clearErrors() {
  document.querySelectorAll(".form-error").forEach(el => el.textContent = "");
  document.querySelectorAll(".form-control.error").forEach(el => el.classList.remove("error"));
  document.getElementById("alert-container").innerHTML = "";
}

function parseAuthError(msg, status) {
  if (status === 409) return "Este correo ya esta registrado.";
  if ((msg || "").toLowerCase().includes("already") || (msg || "").toLowerCase().includes("registrado"))
    return "Este correo ya esta registrado.";
  if ((msg || "").toLowerCase().includes("password") || (msg || "").toLowerCase().includes("contraseña"))
    return "La contraseña no cumple los requisitos.";
  return msg || "Error al registrarse.";
}
</script>
</body>
</html>
