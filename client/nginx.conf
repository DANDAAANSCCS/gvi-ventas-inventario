server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # --- No cachear HTML (permite actualizar sin bust) ---
  location ~* \.(?:html)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }

  # --- No cachear config.js (API_URL inyectada en runtime) ---
  location = /js/config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }
  location = /admin/js/config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }
  location = /db/js/config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }

  # --- Cacheo largo para CSS/JS/imagenes estaticas ---
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    access_log off;
  }

  # --- Panel admin en /admin ---
  # NO incluimos $uri/ en try_files porque admin-web no tiene index.html
  # y eso provocaria 403. Si piden /admin/ cae directo a login.html.
  location /admin/ {
    try_files $uri /admin/login.html;
  }
  location = /admin {
    return 301 /admin/;
  }

  # --- DB manager en /db ---
  location /db/ {
    try_files $uri /db/login.html;
  }
  location = /db {
    return 301 /db/;
  }

  # --- Cliente publico (fallback general) ---
  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
