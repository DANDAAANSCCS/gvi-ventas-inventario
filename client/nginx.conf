server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # No cachear el HTML ni el config.js para poder cambiar la URL de API sin rebuild.
  location ~* \.(?:html)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }
  location = /js/config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }

  # Cacheo largo para CSS/JS estaticos (hash por contenido no aplica: controla el navegador).
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
