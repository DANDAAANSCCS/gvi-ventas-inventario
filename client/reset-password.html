<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña — GesVentas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">🏪 GesVentas</a>
  <ul class="nav-links">
    <li><a href="login.html">Iniciar Sesión</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Nueva contraseña</h1>
    <p class="auth-subtitle">Elige una contraseña nueva para tu cuenta.</p>

    <div id="alert-container"></div>

    <div id="no-token" class="alert alert-danger" style="display:none">
      ❌ Enlace invalido o incompleto. Solicita uno nuevo desde
      <a href="forgot-password.html">aquí</a>.
    </div>

    <form id="reset-form" novalidate autocomplete="off" style="display:none">
      <div class="form-group">
        <label class="form-label" for="password">Nueva contraseña *</label>
        <input type="password" id="password" class="form-control"
               placeholder="Mínimo 8 caracteres"
               autocomplete="new-password"
               readonly
               onfocus="this.removeAttribute('readonly');" />
        <div class="form-hint">Usa letras, números y caracteres especiales</div>
        <div class="form-error" id="err-password"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirmar contraseña *</label>
        <input type="password" id="confirm" class="form-control"
               placeholder="Repite la contraseña"
               autocomplete="new-password"
               readonly
               onfocus="this.removeAttribute('readonly');" />
        <div class="form-error" id="err-confirm"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        Guardar contraseña
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.9rem">
      <a href="login.html">← Volver al login</a>
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api-client.js"></script>
<script src="js/utils.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get("token");
const form = document.getElementById("reset-form");
const alertBox = document.getElementById("alert-container");

if (!token) {
  document.getElementById("no-token").style.display = "block";
} else {
  form.style.display = "block";
}

function setError(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
}

function clearErrors() {
  document.querySelectorAll(".form-error").forEach(el => el.textContent = "");
  alertBox.innerHTML = "";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErrors();

  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  let hasError = false;
  if (!password || password.length < 8) {
    setError("err-password", "La contraseña debe tener al menos 8 caracteres.");
    hasError = true;
  }
  if (password !== confirm) {
    setError("err-confirm", "Las contraseñas no coinciden.");
    hasError = true;
  }
  if (hasError) return;

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Guardando...";

  try {
    await window.api.resetPassword(token, password);
    alertBox.innerHTML = `
      <div class="alert alert-success">
        ✅ Contraseña actualizada. Redirigiendo al login...
      </div>`;
    form.style.display = "none";
    setTimeout(() => window.location.href = "login.html", 1500);
  } catch (err) {
    alertBox.innerHTML =
      `<div class="alert alert-danger">❌ ${escapeHtml(err.message || "No se pudo actualizar la contraseña.")}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Guardar contraseña";
  }
});
</script>
</body>
</html>
