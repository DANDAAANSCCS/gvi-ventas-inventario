server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index login.html;

  # No cachear HTML ni config.js.
  location ~* \.(?:html)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }
  location = /js/config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    expires 0;
  }

  # Cacheo breve para JS/CSS (bustable con ?v=N).
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    access_log off;
  }

  location / {
    try_files $uri $uri/ /login.html;
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
