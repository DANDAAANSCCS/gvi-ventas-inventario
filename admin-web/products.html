<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GVI Admin — Productos</title>
  <link rel="stylesheet" href="css/admin.css?v=1">
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h1>Productos</h1>
        <div>
          <button class="btn btn-primary" onclick="openCreateModal()">➕ Nuevo producto</button>
        </div>
      </div>

      <div class="toolbar">
        <input id="q" class="form-control" placeholder="Buscar por nombre o descripcion...">
        <select id="category" class="form-control">
          <option value="">Todas las categorias</option>
        </select>
        <label style="display:flex; align-items:center; gap:.4rem; font-size:.9rem;">
          <input type="checkbox" id="only-active" checked> Solo activos
        </label>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Categoria</th>
              <th class="num">Precio</th>
              <th class="num">Stock</th>
              <th>Activo</th>
              <th>Creado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="products-body">
            <tr><td colspan="7" style="text-align:center; color:var(--text-light);">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api-client.js?v=1"></script>
  <script src="js/utils.js?v=1"></script>
  <script src="js/auth-admin.js?v=1"></script>
  <script src="js/layout.js?v=1"></script>
  <script>
    let currentUser = null;

    async function loadCategories() {
      try {
        const cats = await window.api.getCategories();
        const sel = document.getElementById("category");
        cats.forEach(c => {
          const o = document.createElement("option");
          o.value = c; o.textContent = c;
          sel.appendChild(o);
        });
      } catch (err) { console.error("[categories]", err); }
    }

    async function loadProducts() {
      const body = document.getElementById("products-body");
      const params = {
        q: document.getElementById("q").value.trim() || undefined,
        category: document.getElementById("category").value || undefined,
        only_active: document.getElementById("only-active").checked,
      };
      try {
        const products = await window.api.listProducts(params);
        if (!products.length) {
          body.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--text-light);">Sin resultados.</td></tr>`;
          return;
        }
        body.innerHTML = products.map(p => `
          <tr>
            <td>
              <strong>${escapeHtml(p.name)}</strong>
              ${p.description ? `<br><small style="color:var(--text-light);">${escapeHtml(p.description).slice(0,80)}</small>` : ""}
            </td>
            <td>${escapeHtml(p.category || "—")}</td>
            <td class="num">${formatCurrency(p.price)}</td>
            <td class="num" style="${p.stock < 5 ? 'color:var(--danger); font-weight:600;' : ''}">${p.stock}</td>
            <td>${p.active ? '<span class="badge badge-success">Si</span>' : '<span class="badge badge-secondary">No</span>'}</td>
            <td>${formatDate(p.created_at)}</td>
            <td class="actions">
              <button class="btn btn-sm" onclick="openEditModal('${p.id}')">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}', '${escapeHtml(p.name).replace(/'/g, "\\'")}')">Eliminar</button>
            </td>
          </tr>
        `).join("");
      } catch (err) {
        console.error("[listProducts]", err);
        body.innerHTML = `<tr><td colspan="7" style="color:var(--danger);">Error: ${escapeHtml(err.message || "")}</td></tr>`;
      }
    }

    function productFormHtml(p = {}) {
      return `
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input class="form-control" name="name" required value="${escapeHtml(p.name || "")}">
        </div>
        <div class="form-group">
          <label class="form-label">Descripcion</label>
          <textarea class="form-control" name="description" rows="2">${escapeHtml(p.description || "")}</textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Precio *</label>
            <input class="form-control" name="price" type="number" min="0" step="0.01" required value="${p.price ?? ""}">
          </div>
          <div class="form-group">
            <label class="form-label">Stock</label>
            <input class="form-control" name="stock" type="number" min="0" value="${p.stock ?? 0}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <input class="form-control" name="category" value="${escapeHtml(p.category || "")}">
        </div>
        <div class="form-group">
          <label class="form-label">URL imagen</label>
          <input class="form-control" name="image_url" value="${escapeHtml(p.image_url || "")}">
        </div>
        ${p.id ? `
        <div class="form-group">
          <label style="display:flex; align-items:center; gap:.4rem;">
            <input type="checkbox" name="active" ${p.active ? "checked" : ""}> Activo
          </label>
        </div>` : ""}
      `;
    }

    async function openCreateModal() {
      const res = await openModal({
        title: "Nuevo producto",
        bodyHtml: productFormHtml(),
        confirmText: "Crear",
        onConfirm: async (body) => {
          const values = getFormValues(body);
          if (!values.name || values.price == null) throw new Error("Nombre y precio son obligatorios.");
          const payload = {
            name: values.name,
            description: values.description || null,
            price: values.price,
            stock: values.stock ?? 0,
            category: values.category || null,
            image_url: values.image_url || null,
          };
          return await window.api.createProduct(payload);
        },
      });
      if (res) { showToast("Producto creado", "success"); loadProducts(); }
    }

    async function openEditModal(id) {
      try {
        const p = await window.api.getProduct(id);
        const res = await openModal({
          title: `Editar: ${p.name}`,
          bodyHtml: productFormHtml(p),
          confirmText: "Guardar",
          onConfirm: async (body) => {
            const values = getFormValues(body);
            const payload = {
              name: values.name,
              description: values.description || null,
              price: values.price,
              stock: values.stock ?? 0,
              category: values.category || null,
              image_url: values.image_url || null,
              active: !!values.active,
            };
            return await window.api.updateProduct(id, payload);
          },
        });
        if (res) { showToast("Producto actualizado", "success"); loadProducts(); }
      } catch (err) { showToast(err.message || "Error", "danger"); }
    }

    async function deleteProduct(id, name) {
      const ok = await confirmDialog(`¿Eliminar "${name}"? Se desactivara.`);
      if (!ok) return;
      try {
        await window.api.deleteProduct(id);
        showToast("Producto eliminado", "success");
        loadProducts();
      } catch (err) { showToast(err.message || "Error", "danger"); }
    }

    (async () => {
      currentUser = await requireAdmin(false);
      if (!currentUser) return;
      renderSidebar(currentUser);
      await loadCategories();
      await loadProducts();

      document.getElementById("q").addEventListener("input", debounce(loadProducts, 300));
      document.getElementById("category").addEventListener("change", loadProducts);
      document.getElementById("only-active").addEventListener("change", loadProducts);
    })();
  </script>
</body>
</html>
